debug=2
fork=yes
log_stderror=yes
children=1
disable_tcp=yes

loadmodule "sl"
loadmodule "phonenum"
loadmodule "xlog"
loadmodule "pv"

modparam("phonenum", "shortcode", 1)


request_route {
	if($hdr(X-Case)=="short_de_115") {
		if(!phonenum_match_cn("115", "DE", "sc")) {
			sl_send_reply("500", "short_de_115 Parse Error");
			exit;
		}
		if($phn(sc=>valid)==1) {
			sl_send_reply("200", "short_de_115 OK");
		} else {
			sl_send_reply("500", "short_de_115 FAIL");
		}
		exit;
	}

	if($hdr(X-Case)=="normal_us") {
		if(!phonenum_match_cn("1-484-555-8888", "US", "sc")) {
			sl_send_reply("500", "normal_us Parse Error");
			exit;
		}
		if($phn(sc=>valid)==1) {
			sl_send_reply("200", "normal_us OK");
		} else {
			sl_send_reply("500", "normal_us FAIL");
		}
		exit;
	}

	if($hdr(X-Case)=="normal_e164") {
		if(!phonenum_match("+14155552671", "sc")) {
			sl_send_reply("500", "normal_e164 Parse Error");
			exit;
		}
		if($phn(sc=>valid)==1) {
			sl_send_reply("200", "normal_e164 OK");
		} else {
			sl_send_reply("500", "normal_e164 FAIL");
		}
		exit;
	}

	if($hdr(X-Case)=="short_without_region") {
		if(!phonenum_match("115", "sc")) {
			sl_send_reply("500", "short_without_region Parse Error");
			exit;
		}
		if($phn(sc=>valid)==0) {
			sl_send_reply("200", "short_without_region Expected Invalid");
		} else {
			sl_send_reply("500", "short_without_region Unexpected Valid");
		}
		exit;
	}

	if($hdr(X-Case)=="invalid_alpha") {
		if(!phonenum_match_cn("abc", "DE", "sc")) {
			sl_send_reply("500", "invalid_alpha Parse Error");
			exit;
		}
		if($phn(sc=>valid)==0) {
			sl_send_reply("200", "invalid_alpha Expected Invalid");
		} else {
			sl_send_reply("500", "invalid_alpha Unexpected Valid");
		}
		exit;
	}

	sl_send_reply("500", "Unknown X-Case");
	exit;
}
