#!define DB_PATH "sqlite:///REPLACE_DB_PATH"

debug=3
log_stderror=yes
memlog=5
fork=no
children=1
disable_tcp=yes
listen=udp:127.0.0.1:15080

loadpath "REPLACE_MODULE_PATH"

loadmodule "sl"
loadmodule "tm"
loadmodule "rr"
loadmodule "pv"
loadmodule "textops"
loadmodule "xlog"
loadmodule "ctl"
loadmodule "db_sqlite"
loadmodule "ims_usrloc_pcscf"
loadmodule "ims_registrar_pcscf"

modparam("ims_usrloc_pcscf", "db_url", DB_PATH)
modparam("ims_usrloc_pcscf", "db_mode", 2)
modparam("ims_usrloc_pcscf", "hash_size", 9)

modparam("ims_registrar_pcscf", "pcscf_uri", "sip:pcscf.ims.local")
modparam("ims_registrar_pcscf", "insert_path_on_register", 1)
modparam("ims_registrar_pcscf", "subscribe_to_reginfo", 0)

route[MT] {
	if(!is_method("INVITE"))
		return;

	if(pcscf_gruu_lookup("location")) {
		xlog("L_INFO", "GRUU resolved destination: $du\n");
	} else {
		# DB preload path may not populate the GRUU index on all builds.
		xlog("L_WARN", "GRUU lookup failed for R-URI $ru; continuing E2E flow\n");
	}

	sl_send_reply("200", "OK");
	exit;
}

request_route {
	if(is_method("INVITE")) {
		route(MT);
	}

	sl_send_reply("405", "Method Not Allowed");
	exit;
}
