#!define DB_PATH "sqlite:///REPLACE_DB_PATH"

debug=3
log_stderror=yes
memlog=5
fork=no
children=1
disable_tcp=yes
listen=udp:127.0.0.1:15070

loadpath "REPLACE_MODULE_PATH"

loadmodule "sl"
loadmodule "tm"
loadmodule "rr"
loadmodule "pv"
loadmodule "xlog"
loadmodule "ctl"
loadmodule "db_sqlite"
loadmodule "ims_usrloc_pcscf"

modparam("ims_usrloc_pcscf", "db_url", DB_PATH)
modparam("ims_usrloc_pcscf", "db_mode", 2)
modparam("ims_usrloc_pcscf", "hash_size", 9)

request_route {
    sl_send_reply("200", "OK");
    exit;
}

event_route[core:worker-one-init] {
    xlog("L_INFO", "integration test worker ready\n");
}
