debug=2
log_stderror=yes
memlog=5
fork=no
children=1
disable_tcp=yes
listen=udp:127.0.0.1:15080

loadpath "REPLACE_MODULE_PATH"

loadmodule "sl"
loadmodule "tm"
loadmodule "pv"
loadmodule "xlog"
loadmodule "ctl"
loadmodule "ims_usrloc_pcscf"

modparam("ims_usrloc_pcscf", "db_mode", 0)
modparam("ims_usrloc_pcscf", "hash_size", 9)

request_route {
    sl_send_reply("200", "OK");
    exit;
}

event_route[core:worker-one-init] {
    xlog("L_INFO", "NO_DB integration worker ready\n");
}
