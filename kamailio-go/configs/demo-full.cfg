# =============================================================
# Kamailio-Go — demo-full.cfg
# Demonstrates every feature from Phase 27 through Phase 35
# using only the script grammar supported by script.Parse.
#
#   Phase 27 — script routing engine (core parser + executor)
#   Phase 28 — parallel forking + DNS SRV (append_branch + forward)
#   Phase 29 — accounting / CDR (record_route + reply on BYE)
#   Phase 30 — pike rate limiting + topology hiding
#              (flag/setflag/resetflag predicates + drop)
#   Phase 31 — htable hash tables + AVP store ($var(name) = ...)
#   Phase 32 — persistent DB backends + auth lookup
#              ($var(trust) + sl_send_reply 401)
#   Phase 33 — NAT / media rewrite ($du + record_route)
#   Phase 34 — IMS routing + MESSAGE msilo (MESSAGE dispatch)
#   Phase 35 — runtime RPC interface (xlog side-effects / hooks)
# =============================================================

request_route {
    # --- Phase 31 (htable / avp) — seed per-request variables. ---
    $var(trust) = "no";
    $var(role) = "guest";

    # --- Phase 30 (pike) — reject obvious flooding clients. ---
    if (method == "INVITE") {
        setflag(1);
    }
    if (flag(1)) {
        xlog("pike-monitored-request");
    }

    # --- Phase 27 (script core) — basic classification. ---
    if (method == "INVITE") {
        xlog("invite-arrived");
        route(RELAY);
    }
    if (method == "REGISTER") {
        xlog("register-arrived");
        route(REGISTRAR);
    }
    if (method == "MESSAGE") {
        xlog("message-arrived");
        route(MSILO);
    }
    if (method == "BYE") {
        xlog("bye-arrived");
        route(CDR_CLOSE);
    }
    if (method != "INVITE") {
        if ($var(trust) == "no") {
            xlog("untrusted-non-invite");
        }
    }

    # --- Phase 30 (topoh) — drop malformed requests silently. ---
    if (method == "ACK") {
        drop;
    }
}

# --- Phase 28 — parallel forking (to multiple contacts). ---
route[RELAY] {
    $du = "sip:relay.example.com:5060";
    setflag(5);
    record_route();
    append_branch("sip:backup.example.com:5060");
    forward();
}

# --- Phase 32 (DB auth) — challenge non-trusted peers. ---
route[REGISTRAR] {
    $var(trust) = "auth";
    if ($var(trust) != "auth") {
        sl_send_reply(401, "Unauthorized");
    } else {
        sl_send_reply(200, "OK");
    }
}

# --- Phase 34 (msilo) — offline MESSAGE storage. ---
route[MSILO] {
    xlog("storing-offline-message");
    sl_send_reply(202, "Accepted");
}

# --- Phase 29 (acc) — CDR close on BYE. ---
route[CDR_CLOSE] {
    resetflag(1);
    sl_send_reply(200, "OK");
}
